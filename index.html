<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI Exam Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h1>AI Exam Generator</h1>

<p>Select question count and upload PDF (optional)</p>
<select id="count">
  <option value="20">20 Questions</option>
  <option value="40">40 Questions</option>
  <option value="80" selected>80 Questions</option>
</select>
<input type="file" id="pdf">
<button onclick="generate()">Generate YDS Exam</button>

<pre id="result"></pre>

<button id="download">Download JSON</button>

</div>

<script src="script.js"></script>

</body>
</html>
